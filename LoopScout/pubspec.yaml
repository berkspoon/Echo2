name: loopscout
description: A trail-first running route planner for iPhone.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location & GPS
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # Networking
  http: ^1.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Data models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # Utilities
  path_provider: ^2.1.0
  uuid: ^4.2.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: false

  assets:
    - assets/icons/
    - assets/images/
