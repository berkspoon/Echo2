<!-- Advisory Pipeline Drill-down Partial (HTMX target: #drilldown-panel) -->

<div class="bg-white rounded-lg shadow mt-4">
  <div class="flex items-center justify-between px-6 py-3 border-b border-gray-200">
    <h3 class="text-sm font-semibold text-gray-900">
      {{ drilldown_dimension }}: {{ drilldown_value }}
      <span class="text-gray-400 font-normal">({{ pagination.total }} lead{{ 's' if pagination.total != 1 else '' }})</span>
    </h3>
    <button class="text-xs text-gray-400 hover:text-gray-600"
            onclick="document.getElementById('drilldown-panel').innerHTML=''">
      Close
    </button>
  </div>
  <div class="px-2 py-3">
    {% include "components/_grid.html" %}
  </div>
</div>
